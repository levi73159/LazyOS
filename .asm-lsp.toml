[default_config]
version = "0.10.1"
assembler = "gas"
instruction_set = "x86-64"

[default_config.opts]
diagnostics = true
default_diagnostics = true

[[project]]
path = "src/programs"
version = "0.10.1"
assembler = "nasm"
instruction_set = "x86-64"

[project.opts]
compiler = "nasm"
compile_flags_txt = [
    "-f",
    "bin",
    "-o",
    "/dev/null",
]
diagnostics = true
default_diagnostics = false
